<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
          "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>HelloWorld</title>
  <style type="text/css">
    body      { background:#cccccc; font-family:Helvetica,Arial,sans-serif;
                font-size:12px; margin:0; padding:20px; }
    .frame    { width:520px; margin:50px auto; border:2px solid #555;
                background:white; box-shadow:3px 3px 8px rgba(0,0,0,.45); }
    .titlebar { background:#336699; color:white; padding:5px 12px;
                font-size:13px; font-weight:bold; }
    .body     { padding:22px 24px; }
    h1        { font-size:20px; color:#003366; margin:0 0 14px; }
    .info     { margin-top:18px; border-top:1px solid #ddd; padding-top:12px;
                font-size:11px; color:#555; }
    .info td  { padding:2px 8px 2px 0; }
    tt        { font-size:11px; }
  </style>
</head>
<body>
<div class="frame">
  <div class="titlebar">WebObjects Application: <webobject name="AppName"></webobject></div>
  <div class="body">
    <h1>Hello, World!</h1>
    <p>This page was served by <b>HelloWorld.woa</b>,
       a real <b>WebObjects 5.4</b> application.</p>
    <div class="info">
      <table border="0" cellspacing="0">
        <tr><td>Application:</td><td><b><webobject name="AppName"></webobject></b></td></tr>
        <tr><td>Session&nbsp;ID:</td><td><b><tt><webobject name="SessionID"></webobject></tt></b></td></tr>
        <tr><td>Framework:</td><td><b>WebObjects 5.4.3</b></td></tr>
      </table>
    </div>
    <p style="margin-top:18px; text-align:center;">
      <webobject name="GuestbookLink">&#9733; Sign the Guestbook &#9733;</webobject>
    </p>
    <p style="margin-top:18px; text-align:center;">
      <a href="https://github.com/radiantnode/HelloWorld.woa">Check out the GitHub repo!</a>
    </p>
  </div>
</div>
</body>
</html>
